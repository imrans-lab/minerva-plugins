# Gerber-writer spike test board, expressed in the canonical board-source
# contract (see pcb/docs/board-yaml.md and pcb/internal/board/board.go).
#
# This YAML is the human-readable reference for what generate.py builds.
# generate.py hard-codes the equivalent geometry directly against the
# gerber_writer API rather than parsing this file — a generic
# canonical-YAML -> gerber-writer compiler is implementation-child scope
# (DCR 019eb47ddebc), not spike scope. The point of this file is to prove
# the test board is expressible in the canonical model's terms.
version: 1
name: GerberSpikeBoard
width_mm: 40
height_mm: 30
grid_mm: 1.27
layers: [top, bottom]
origin: {x_mm: 0, y_mm: 0}
design_rules:
  clearance_mm: 0.2
  trace_width_mm: 0.25
  via_diameter_mm: 0.8
  via_drill_mm: 0.4

components:
  - ref: R1
    footprint: R_0805
    value: "10k"
    x_mm: 10
    y_mm: 10
    rotation_deg: 0
    layer: top
    pins:
      - {number: "1", name: A, x_mm: -0.95, y_mm: 0}   # SMD rect pad, F.Cu
      - {number: "2", name: B, x_mm: 0.95, y_mm: 0}    # SMD rect pad, F.Cu
  - ref: C1
    footprint: C_0805
    value: "100nF"
    x_mm: 10
    y_mm: 20
    rotation_deg: 0
    layer: top
    pins:
      - {number: "1", name: A, x_mm: -0.95, y_mm: 0}   # SMD rect pad, F.Cu
      - {number: "2", name: B, x_mm: 0.95, y_mm: 0}    # SMD rect pad, F.Cu
  - ref: U1
    footprint: TH_TestPoint
    value: TP1
    x_mm: 30
    y_mm: 15
    rotation_deg: 0
    layer: top
    pins:
      # Through-hole pad: copper annulus on BOTH F.Cu and B.Cu, plated drill
      # in the Excellon PTH file. drill/annulus diameters carried in Extra
      # since the canonical Pin struct has no drill field yet (gap: TH pads
      # are not first-class in the schema today, see REPORT.md finding).
      - {number: "1", name: VCC, x_mm: 0, y_mm: 0, drill_mm: 0.8, annulus_diameter_mm: 1.6}

nets:
  - name: VCC
    pins: ["R1.2", "U1.1"]
  - name: GND
    pins: ["R1.1", "C1.1"]

traces:
  - net: VCC
    layer: top
    width_mm: 0.25
    points:
      - {x_mm: 10.95, y_mm: 10}
      - {x_mm: 20, y_mm: 10}      # -> via
  - net: VCC
    layer: bottom
    width_mm: 0.25
    points:
      - {x_mm: 20, y_mm: 10}      # via landing, B.Cu
      - {x_mm: 30, y_mm: 15}      # U1 TH pad (has copper on B.Cu too)
  - net: GND
    layer: top
    width_mm: 0.25
    points:
      - {x_mm: 9.05, y_mm: 10}
      - {x_mm: 9.05, y_mm: 20}

vias:
  - {x_mm: 20, y_mm: 10, drill_mm: 0.4, diameter_mm: 0.8, net: VCC,
     from_layer: top, to_layer: bottom}

# Board outline (Edge.Cuts): rectangle 0,0 -> 40,30.
# Not a first-class field in the canonical schema yet (outline is implied by
# width_mm/height_mm at origin) -- generate.py draws it as the axis-aligned
# rectangle implied by width_mm/height_mm/origin.

# --- Gaps surfaced by this spike (see REPORT.md "schema gaps" section) ---
# Extra is the schema's documented forward-compat escape hatch (board-yaml.md
# "Losslessness & the warnings list"); used here for the two entities this
# spike needed that the canonical model does not model yet: TH pad drill
# geometry (see U1.pins[0] above) and non-plated mounting holes (below).
mounting_holes:            # NOT a canonical field -- carried as Board.Extra
  - {x_mm: 5, y_mm: 5, diameter_mm: 3.2, plated: false}
