name: presentation

on:
  push:
    branches: [main, "dcr/**"]
    paths:
      - "presentation/**"
      - ".github/workflows/presentation.yml"
      - "scripts/smoke/**"
    tags: ["presentation-v*"]
  pull_request:
    paths:
      - "presentation/**"
      - ".github/workflows/presentation.yml"
      - "scripts/smoke/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: presentation (${{ matrix.target }})
    # Public-repo standard runners are free across all OSes, so full matrix
    # runs on every trigger. (Matrix context isn't valid in job-level `if:`.)
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runs-on: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ""
          - target: linux-arm64
            runs-on: ubuntu-22.04-arm
            goos: linux
            goarch: arm64
            ext: ""
          - target: macos-universal
            runs-on: macos-14
            goos: darwin
            goarch: ""
            ext: ""
          - target: windows-x86_64
            runs-on: windows-2022
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: bash
        working-directory: presentation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build (native)
        if: matrix.target != 'macos-universal'
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          go build -o "build/presentation-plugin${{ matrix.ext }}" .

      - name: Build (macOS universal — lipo amd64 + arm64)
        if: matrix.target == 'macos-universal'
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p build
          GOOS=darwin GOARCH=amd64 go build -o build/presentation-plugin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o build/presentation-plugin-arm64 .
          lipo -create \
            build/presentation-plugin-amd64 \
            build/presentation-plugin-arm64 \
            -output build/presentation-plugin
          lipo -info build/presentation-plugin

      - name: Go test (linux-x86_64 only — Linux is the source of truth)
        if: matrix.target == 'linux-x86_64'
        run: go test ./...

      - name: Smoke
        run: python3 ../scripts/smoke/mcp_smoke.py build/presentation-plugin${{ matrix.ext }}

      - name: Pack release tarball
        run: |
          PLATFORM="${{ matrix.target }}"
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          mkdir -p dist
          PACKDIR="dist/presentation-${VERSION}-${PLATFORM}"
          mkdir -p "$PACKDIR"
          cp build/presentation-plugin${{ matrix.ext }} "$PACKDIR/"
          cp manifest.json "$PACKDIR/"
          # SHA256SUMS covers the binary AND manifest.json — Minerva's
          # installer will need both verified for a trustworthy install.
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$PACKDIR" && sha256sum presentation-plugin${{ matrix.ext }} manifest.json > SHA256SUMS)
          else
            (cd "$PACKDIR" && shasum -a 256 presentation-plugin${{ matrix.ext }} manifest.json > SHA256SUMS)
          fi
          tar -czf "dist/presentation-${VERSION}-${PLATFORM}.tar.gz" -C "$PACKDIR" .
          ls -la "dist/presentation-${VERSION}-${PLATFORM}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: presentation-${{ matrix.target }}
          path: presentation/dist/presentation-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all matrix tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: presentation-*
          path: artifacts/
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Compute tag + prerelease flag
        id: tag
        shell: bash
        run: |
          VERSION=$(python3 -c 'import json; print(json.load(open("presentation/manifest.json"))["version"])')
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            PRE="false"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            TAG="presentation-v${VERSION}"
            PRE="false"
          else
            SAFE_BRANCH=$(echo "$GITHUB_REF_NAME" | sed 's|/|-|g; s|[^a-zA-Z0-9_.-]|-|g')
            TAG="presentation-v${VERSION}-branch-${SAFE_BRANCH}"
            PRE="true"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"
          echo "Computed: tag=$TAG prerelease=$PRE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          target_commitish: ${{ github.sha }}
          files: artifacts/presentation-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
