name: cad

on:
  push:
    branches: [main, "dcr/**"]
    paths:
      - "cad/**"
      - ".github/workflows/cad.yml"
      - "scripts/**"
    tags: ["cad-v*"]
  pull_request:
    paths:
      - "cad/**"
      - ".github/workflows/cad.yml"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: cad (${{ matrix.target }})
    # Public-repo standard runners are free across all OSes, so full matrix
    # runs on every trigger. (Matrix context isn't valid in job-level `if:`.)
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runs-on: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ""
          # linux-arm64 dropped 2026-05-27 (DCR 019e6a4bcb0c): cadquery-ocp
          # 7.8.x ships no manylinux_aarch64 wheels (only x86_64 + macos +
          # win_amd64). build123d 0.10.0 pins cadquery-ocp<7.9. Restoring
          # linux-arm64 requires either bumping to build123d 0.11+ (when it
          # supports cadquery-ocp 7.9 with aarch64 wheels) or pulling
          # cadquery-ocp aarch64 wheels from a private channel. Tracked as
          # follow-up; user said linux-arm64 is nice-to-have, not MUST.
          - target: macos-universal
            runs-on: macos-14
            goos: darwin
            goarch: ""
            ext: ""
          - target: windows-x86_64
            runs-on: windows-2022
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: bash
        working-directory: cad
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # cad has no external deps (no go.sum); disable module cache to avoid
          # cache-dependency-path errors. Build cache still works automatically.
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install zstd (Linux)
        if: matrix.goos == 'linux'
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y zstd
          fi
          zstd --version

      - name: Install zstd (macOS)
        if: matrix.target == 'macos-universal'
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            brew install zstd
          fi
          zstd --version

      - name: Install zstd (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          # zstd is bundled in the Windows runner's Git for Windows toolchain;
          # confirm it's on PATH for the subsequent bash steps.
          $env:Path = "$env:GITHUB_WORKSPACE\..\..\Program Files\Git\usr\bin;" + $env:Path
          zstd --version

      - name: Cache PBS downloads
        uses: actions/cache@v4
        with:
          # Cache the python-build-standalone tarballs (~25-50MB each, ~5min
          # download cold). Key on the lock file so a version bump invalidates.
          path: cad/runtime-build/cache/pbs
          key: pbs-${{ matrix.target }}-${{ hashFiles('cad/scripts/runtime-bundle.lock') }}

      # ----- Build runtime bundle (per W1a) -----
      # Native + cross targets each produce one bundle. macos-universal
      # produces TWO (one per arch) — the lipo'd Go binary embeds both via
      # the per-platform build tags in cad/internal/runtime/embed_darwin_*.go.

      - name: Build runtime bundle (single arch)
        if: matrix.target != 'macos-universal'
        run: |
          bash ../scripts/build-python-runtime-bundle.sh . ${{ matrix.target }}
          ls -la internal/runtime/bundle/

      - name: Build runtime bundle (macos arm64 + amd64 for lipo)
        if: matrix.target == 'macos-universal'
        run: |
          bash ../scripts/build-python-runtime-bundle.sh . macos-arm64
          bash ../scripts/build-python-runtime-bundle.sh . macos-amd64
          ls -la internal/runtime/bundle/

      - name: Build (native)
        if: matrix.target != 'macos-universal'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p build
          go build -o build/cad-plugin${{ matrix.ext }} .

      - name: Build (macOS universal — lipo amd64 + arm64)
        if: matrix.target == 'macos-universal'
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p build
          GOOS=darwin GOARCH=amd64 go build -o build/cad-plugin.amd64 .
          GOOS=darwin GOARCH=arm64 go build -o build/cad-plugin.arm64 .
          lipo -create \
            build/cad-plugin.amd64 \
            build/cad-plugin.arm64 \
            -output build/cad-plugin
          lipo -info build/cad-plugin

      - name: Binary-size assertion (catches go:embed silently consuming empty bundle)
        run: |
          # The embedded bundle is ~150-250MB per platform. A binary smaller
          # than 100MB means go:embed didn't find / consumed an empty file.
          # Portable byte-count via wc -c works across BSD/GNU stat.
          BIN="build/cad-plugin${{ matrix.ext }}"
          if [ ! -f "$BIN" ]; then
            echo "::error::built binary not found at $BIN"; exit 1
          fi
          SIZE=$(wc -c < "$BIN")
          echo "binary size: $SIZE bytes ($((SIZE / 1024 / 1024)) MB)"
          if [ "$SIZE" -lt 100000000 ]; then
            echo "::error::binary too small ($SIZE bytes < 100MB) — go:embed likely failed"
            exit 1
          fi

      - name: Go test (linux-x86_64 only — Linux is the source of truth)
        if: matrix.target == 'linux-x86_64'
        env:
          # Speed up bridge tests: cold-start scenarios get a 5s ready window
          # instead of the production 60s default. Long real-cold-start cases
          # are covered by the embedded_python_spawn_test which doesn't override.
          MINERVA_WORKER_READY_TIMEOUT_SEC: "5"
        run: go test ./...

      - name: Smoke
        run: python3 ../scripts/smoke/mcp_smoke.py build/cad-plugin${{ matrix.ext }}

      - name: Pack release tarball
        run: |
          PLATFORM="${{ matrix.target }}"
          VERSION=$(python3 -c 'import json; print(json.load(open("manifest.json"))["version"])')
          mkdir -p dist
          PACKDIR="dist/cad-${VERSION}-${PLATFORM}"
          mkdir -p "$PACKDIR"
          cp build/cad-plugin${{ matrix.ext }} "$PACKDIR/"
          cp manifest.json "$PACKDIR/"
          # Include the ui/ directory — manifest declares godot_scene panels
          # referencing ui/CADPanel.tscn + ui/scripts/*.gd. Without these the
          # marketplace-installed plugin can start its backend but cannot
          # open its panel ("Whitelisted script not found"). Side-load works
          # because ui/ exists in the plugin source dir.
          cp -r ui "$PACKDIR/"
          # SHA256SUMS covers binary + manifest + every shipped ui/ file.
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$PACKDIR" && find . -type f ! -name SHA256SUMS -print0 \
              | xargs -0 sha256sum | sed 's| \./| |' > SHA256SUMS)
          else
            (cd "$PACKDIR" && find . -type f ! -name SHA256SUMS -print0 \
              | xargs -0 shasum -a 256 | sed 's| \./| |' > SHA256SUMS)
          fi
          tar -czf "dist/cad-${VERSION}-${PLATFORM}.tar.gz" -C "$PACKDIR" .
          echo "Packed contents (first 30):"
          tar -tzf "dist/cad-${VERSION}-${PLATFORM}.tar.gz" | head -30
          ls -la "dist/cad-${VERSION}-${PLATFORM}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cad-${{ matrix.target }}
          path: cad/dist/cad-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all matrix tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: cad-*
          path: artifacts/
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Compute tag + prerelease flag
        id: tag
        shell: bash
        run: |
          VERSION=$(python3 -c 'import json; print(json.load(open("cad/manifest.json"))["version"])')
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            PRE="false"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            TAG="cad-v${VERSION}"
            PRE="false"
          else
            SAFE_BRANCH=$(echo "$GITHUB_REF_NAME" | sed 's|/|-|g; s|[^a-zA-Z0-9_.-]|-|g')
            TAG="cad-v${VERSION}-branch-${SAFE_BRANCH}"
            PRE="true"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"
          echo "Computed: tag=$TAG prerelease=$PRE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          target_commitish: ${{ github.sha }}
          files: artifacts/cad-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
