name: scansort

# retrigger 2026-05-26: validate that imrans-lab org now supports the
# specialty runner labels (ubuntu-22.04-arm, macos-14, windows-2022).
on:
  push:
    branches: [main, "dcr/**"]
    paths:
      - "scansort/**"
      - ".github/workflows/scansort.yml"
      - "scripts/smoke/**"
    tags: ["scansort-v*"]
  pull_request:
    paths:
      - "scansort/**"
      - ".github/workflows/scansort.yml"
      - "scripts/smoke/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: scansort (${{ matrix.target }})
    # Public-repo standard runners are free across all OSes, so the full
    # matrix runs on every trigger including PRs. (Earlier `if:` filter
    # referenced `matrix.target` at job level, which GitHub rejects —
    # matrix context isn't expanded until step-level.)
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runs-on: ubuntu-22.04
            rust-targets: ""
            ext: ""
          - target: linux-arm64
            runs-on: ubuntu-22.04-arm
            rust-targets: ""
            ext: ""
          - target: macos-universal
            runs-on: macos-14
            rust-targets: "x86_64-apple-darwin,aarch64-apple-darwin"
            ext: ""
          - target: windows-x86_64
            runs-on: windows-2022
            rust-targets: ""
            ext: ".exe"
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: bash
        working-directory: scansort
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scansort -> target
          key: ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'macos-universal'
        run: cargo build --release --locked

      - name: Build (macOS universal — lipo x86_64 + arm64)
        if: matrix.target == 'macos-universal'
        run: |
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/x86_64-apple-darwin/release/scansort-plugin \
            target/aarch64-apple-darwin/release/scansort-plugin \
            -output target/release/scansort-plugin
          lipo -info target/release/scansort-plugin

      - name: Cargo test (linux-x86_64 only — Linux is the source of truth)
        if: matrix.target == 'linux-x86_64'
        run: cargo test --release --locked

      - name: Smoke
        run: python3 ../scripts/smoke/mcp_smoke.py target/release/scansort-plugin${{ matrix.ext }}

      - name: Pack release tarball
        run: |
          PLATFORM="${{ matrix.target }}"
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          mkdir -p dist
          PACKDIR="dist/scansort-${VERSION}-${PLATFORM}"
          mkdir -p "$PACKDIR"
          cp target/release/scansort-plugin${{ matrix.ext }} "$PACKDIR/"
          cp manifest.json "$PACKDIR/"
          # Include the ui/ directory — manifest declares godot_scene panels
          # referencing ui/ScansortPanel.tscn + ui/*.gd files, which Minerva's
          # PluginScenePanelHost loads at panel-open time from the install
          # directory. Without these the marketplace-installed plugin can
          # start its backend (binary works) but cannot open its panel
          # ("Whitelisted script not found"). Side-load worked because the
          # ui/ tree exists in the plugin source dir on disk.
          cp -r ui "$PACKDIR/"
          # SHA256SUMS covers binary + manifest + every shipped ui/ file so
          # tampering with any panel script is caught at install time.
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$PACKDIR" && find . -type f ! -name SHA256SUMS -print0 \
              | xargs -0 sha256sum | sed 's| \./| |' > SHA256SUMS)
          else
            (cd "$PACKDIR" && find . -type f ! -name SHA256SUMS -print0 \
              | xargs -0 shasum -a 256 | sed 's| \./| |' > SHA256SUMS)
          fi
          tar -czf "dist/scansort-${VERSION}-${PLATFORM}.tar.gz" -C "$PACKDIR" .
          echo "Packed contents:"
          tar -tzf "dist/scansort-${VERSION}-${PLATFORM}.tar.gz" | head -30
          ls -la "dist/scansort-${VERSION}-${PLATFORM}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scansort-${{ matrix.target }}
          path: scansort/dist/scansort-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    # Auto-tag releases on every push (branch or explicit tag). Skip
    # PRs — fork tokens are read-only and cannot publish releases.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all matrix tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: scansort-*
          path: artifacts/
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Compute tag + prerelease flag
        id: tag
        shell: bash
        run: |
          VERSION=$(python3 -c 'import json; print(json.load(open("scansort/manifest.json"))["version"])')
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Explicit tag push: honor the tag as-is, not a prerelease.
            TAG="${GITHUB_REF#refs/tags/}"
            PRE="false"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            # Clean version tag on main pushes.
            TAG="scansort-v${VERSION}"
            PRE="false"
          else
            # Auto-tag from any other branch (topic/development/etc.) with
            # `-branch-<sanitized-branch>` sentinel so the marketplace
            # registry filter can skip these test builds.
            SAFE_BRANCH=$(echo "$GITHUB_REF_NAME" | sed 's|/|-|g; s|[^a-zA-Z0-9_.-]|-|g')
            TAG="scansort-v${VERSION}-branch-${SAFE_BRANCH}"
            PRE="true"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"
          echo "Computed: tag=$TAG prerelease=$PRE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          target_commitish: ${{ github.sha }}
          files: artifacts/scansort-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
